---
# FiduciaryOS DPO Training Configuration
# Stage 3: Direct Preference Optimization
# Hardware: 10x NVIDIA A6000 48GB (GPUs 8-17)

model:
  path: checkpoints/grpo
  trust_remote_code: true
  torch_dtype: bfloat16

data:
  path: data/train/fiduciary_dpo.jsonl
  # DPO pairs: chosen (high-quality fiduciary response) vs rejected (low-quality)
  # Sources:
  #   - synthesis/fiduciary_pairs.py curated templates (50 pairs)
  #   - GRPO top/bottom from G=8 sampling
  #   - Human expert review (if available)
  max_length: 4096
  max_prompt_length: 2048

training:
  output_dir: checkpoints/dpo
  num_train_epochs: 2
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-7       # DPO uses much lower LR than SFT
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  bf16: true
  logging_steps: 10
  eval_strategy: steps
  eval_steps: 200
  save_strategy: steps
  save_steps: 200
  save_total_limit: 2
  load_best_model_at_end: true
  deepspeed: training/configs/deepspeed_zero3.json
  report_to: wandb
  run_name: fiduciaryos-dpo-v1

dpo:
  beta: 0.1             # KL divergence coefficient (lower = less conservative)
  loss_type: sigmoid    # Standard DPO sigmoid loss
  ref_model: null       # null = implicit reference (copy of policy at init)

# Expected improvement from DPO:
# Win rate vs SFT-only on fiduciary quality: 65-72%
# Reduction in hedge-all-bets non-answers: ~35%
# Runtime: ~18 hours on 10x A6000
