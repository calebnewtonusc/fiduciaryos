---
# FiduciaryOS GRPO Training Configuration
# Stage 2: Group Relative Policy Optimization
# Hardware: 10x NVIDIA A6000 48GB (GPUs 8-17)

model:
  path: checkpoints/sft/merged
  trust_remote_code: true
  torch_dtype: bfloat16

data:
  path: data/train/grpo_prompts.jsonl
  # GRPO prompts are fiduciary violation detection scenarios
  # Each prompt has ground-truth violation labels for reward computation

training:
  output_dir: checkpoints/grpo
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-5
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  bf16: true
  logging_steps: 10
  save_strategy: steps
  save_steps: 250
  save_total_limit: 2
  deepspeed: training/configs/deepspeed_zero3.json
  report_to: wandb
  run_name: fiduciaryos-grpo-v1

grpo:
  num_generations: 8        # Sample G=8 completions per prompt
  max_new_tokens: 1024
  temperature: 0.9
  # Reward weights (must sum to 1.0)
  reward_weights:
    policy_compliance: 0.50
    format: 0.20
    fiduciary_quality: 0.30

# Expected improvement from GRPO:
# Policy compliance accuracy: +12-18%
# Fiduciary quality score: +15-22%
# Runtime: ~40 hours on 10x A6000
