---
# FiduciaryOS SFT Training Configuration
# Stage 1: Supervised Fine-Tuning on fiduciary decision corpus
# Hardware: 10x NVIDIA A6000 48GB (GPUs 8-17)

model:
  name_or_path: Qwen/Qwen2.5-7B-Coder-Instruct
  trust_remote_code: true
  attn_implementation: flash_attention_2
  torch_dtype: bfloat16

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM

data:
  train_path: data/train/fiduciary_sft.jsonl
  val_split: 0.02
  max_seq_length: 4096
  dataset_text_field: text

training:
  output_dir: checkpoints/sft
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  # Effective batch size: 2 * 8 * 10 GPUs = 160 samples/step
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  bf16: true
  tf32: true
  gradient_checkpointing: true
  logging_steps: 10
  eval_strategy: steps
  eval_steps: 500
  save_strategy: steps
  save_steps: 500
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  dataloader_num_workers: 4
  remove_unused_columns: false
  deepspeed: training/configs/deepspeed_zero3.json
  report_to: wandb
  run_name: fiduciaryos-sft-v1

# Expected training metrics:
# Initial loss: ~2.4
# Final loss target: ~0.85
# Eval loss target: ~0.92
# Runtime: ~28 hours on 10x A6000
